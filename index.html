<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural & Touch Snake Game</title>

    <!-- 1. ICONA DEL BROWSER (FAVICON) -->
    <link rel="icon" type="image/png" href="preview.png">
    <link rel="apple-touch-icon" href="preview.png">

    <!-- 2. ANTEPRIMA PER LINK (Meta Tags Open Graph) -->
    <meta property="og:title" content="Neural Snake Game">
    <meta property="og:description" content="Gioca a Snake con il touch, la tastiera o la tua Neural Band!">
    <meta property="og:image" content="preview.png">
    <meta property="og:type" content="website">
    
    <!-- Sostituisci questo link con il tuo link reale di GitHub Pages per una perfetta compatibilità -->
    <meta property="og:url" content="https://tuo-username.github.io/nome-repo/">

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; 
        }

        h1 {
            margin: 5px 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #00e5ff;
            color: #00e5ff;
        }

        #score-board {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        #score {
            font-weight: bold;
            color: #00e5ff;
        }

        canvas {
            border: 4px solid #00e5ff;
            background-color: #050505;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.3);
            border-radius: 4px;
            max-width: 90vw;
            max-height: 50vh;
        }

        .info-box {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            line-height: 1.4;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h1>NEURAL SNAKE</h1>
    <div id="score-board">Punteggio: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="info-box">
        <strong>Comandi:</strong> Frecce (PC) | Swipe (Mobile)<br>
        Pronto per Neural Band via: <code>moveNeural('UP')</code>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameSpeed = 25; 
        let gameInterval;

        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        window.addEventListener("keydown", handleKeyboard);
        
        window.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: false });

        window.addEventListener("touchend", (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: false });

        window.addEventListener("touchmove", (e) => {
            e.preventDefault();
        }, { passive: false });

        main();

        function main() {
            if (hasGameEnded()) {
                alert(`Game Over! Punteggio: ${score}`);
                resetGame();
            }

            gameInterval = setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#00ffff" : "#00b3cc";
                ctx.strokeStyle = "#050505";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            snake.forEach(function(part) {
                if (part.x === food.x && part.y === food.y) generateFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff0055"; 
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
        }
        
        function moveNeural(direction) {
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            switch(direction.toUpperCase()) {
                case 'LEFT':
                    if (!goingRight) { dx = -1; dy = 0; }
                    break;
                case 'UP':
                    if (!goingDown) { dx = 0; dy = -1; }
                    break;
                case 'RIGHT':
                    if (!goingLeft) { dx = 1; dy = 0; }
                    break;
                case 'DOWN':
                    if (!goingUp) { dx = 0; dy = 1; }
                    break;
            }
        }

        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const threshold = 30; 

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) moveNeural('RIGHT');
                    else moveNeural('LEFT');
                }
            } else {
                if (Math.abs(diffY) > threshold) {
                    if (diffY > 0) moveNeural('DOWN');
                    else moveNeural('UP');
                }
            }
        }

        function handleKeyboard(event) {
            if (event.keyCode === 37) moveNeural('LEFT');
            if (event.keyCode === 38) moveNeural('UP');
            if (event.keyCode === 39) moveNeural('RIGHT');
            if (event.keyCode === 40) moveNeural('DOWN');
        }

        window.moveNeural = moveNeural;

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount;
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            score = 0;
            scoreElement.innerText = score;
            dx = 0; dy = 0;
            generateFood();
        }
    </script>
</body>
</html>
