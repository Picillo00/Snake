<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural & Touch Snake Game</title>

    <link rel="icon" type="image/png" href="preview.png.jpg">
    <link rel="apple-touch-icon" href="preview.png.jpg">

    <meta property="og:title" content="Neural Snake Game">
    <meta property="og:description" content="Gioca a Snake a schermo intero!">
    <meta property="og:image" content="preview.png.jpg">
    <meta property="og:type" content="website">

    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background-color: #050505;
            display: block;
        }

        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: rgba(0, 229, 255, 0.8);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            pointer-events: none; /* Non blocca i tocchi sullo schermo */
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="score-board">Punti: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Configurazione griglia dinamica basata sullo schermo
        const gridSize = 20;
        let tileCountX, tileCountY;

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        
        // CORREZIONE: 100ms è la velocità ottimale (prima era 1ms, ingiocabile)
        const gameSpeed = 100; 
        let gameTimeout;

        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        // Adatta il canvas a pieno schermo mantenendo i pixel multipli della griglia
        function resizeCanvas() {
            canvas.width = Math.floor(window.innerWidth / gridSize) * gridSize;
            canvas.height = Math.floor(window.innerHeight / gridSize) * gridSize;
            tileCountX = canvas.width / gridSize;
            tileCountY = canvas.height / gridSize;
            resetGame();
        }

        window.addEventListener('resize', resizeCanvas);

        window.addEventListener("keydown", handleKeyboard);
        window.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: false });

        window.addEventListener("touchend", (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: false });

        window.addEventListener("touchmove", (e) => {
            e.preventDefault();
        }, { passive: false });

        // Inizializza le dimensioni ed avvia il loop principale
        resizeCanvas();
        main();

        function main() {
            if (hasGameEnded()) {
                alert(`Game Over! Punteggio: ${score}`);
                resetGame();
            }

            gameTimeout = setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#00e5ff" : "#0097a7";
                ctx.strokeStyle = "#050505";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 1, gridSize - 1);
            });
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCountX);
            food.y = Math.floor(Math.random() * tileCountY);
            snake.forEach(function(part) {
                if (part.x === food.x && part.y === food.y) generateFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff0055"; 
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }
        
        function moveNeural(direction) {
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            switch(direction.toUpperCase()) {
                case 'LEFT':
                    if (!goingRight) { dx = -1; dy = 0; }
                    break;
                case 'UP':
                    if (!goingDown) { dx = 0; dy = -1; }
                    break;
                case 'RIGHT':
                    if (!goingLeft) { dx = 1; dy = 0; }
                    break;
                case 'DOWN':
                    if (!goingUp) { dx = 0; dy = 1; }
                    break;
            }
        }

        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const threshold = 30; 

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) moveNeural('RIGHT');
                    else moveNeural('LEFT');
                }
            } else {
                if (Math.abs(diffY) > threshold) {
                    if (diffY > 0) moveNeural('DOWN');
                    else moveNeural('UP');
                }
            }
        }

        function handleKeyboard(event) {
            if (event.keyCode === 37) moveNeural('LEFT');
            if (event.keyCode === 38) moveNeural('UP');
            if (event.keyCode === 39) moveNeural('RIGHT');
            if (event.keyCode === 40) moveNeural('DOWN');
        }

        window.moveNeural = moveNeural;

        function hasGameEnded() {
            if (snake.length === 0) return false;
            
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= tileCountX || snake[0].y < 0 || snake[0].y >= tileCountY;
        }

        function resetGame() {
            clearTimeout(gameTimeout);
            snake = [{ x: Math.floor(tileCountX / 2), y: Math.floor(tileCountY / 2) }];
            score = 0;
            scoreElement.innerText = score;
            dx = 0; 
            dy = 0;
            generateFood();
        }
    </script>
</body>
</html>
