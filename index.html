<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #4caf50;
        }

        #score-board {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        #score {
            font-weight: bold;
            color: #4caf50;
        }

        canvas {
            border: 4px solid #4caf50;
            background-color: #111;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .controls-info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score-board">Punteggio: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls-info">Usa le frecce direzionali (▲ ▼ ◄ ►) per muoverti</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Inizializzazione serpente (parte dal centro)
        let snake = [
            { x: 10, y: 10 },
        ];
        
        // Cibo
        let food = { x: 5, y: 5 };

        // Velocità e direzione iniziale (fermo all'inizio)
        let dx = 0;
        let dy = 0;

        let score = 0;
        let gameSpeed = 100; // Millisecondi per frame (più è basso, più è veloce)
        let gameInterval;

        // Ascolta i tasti premuti
        window.addEventListener("keydown", changeDirection);

        // Avvia il ciclo del gioco
        main();

        function main() {
            if (hasGameEnded()) {
                alert(`Game Over! Il tuo punteggio: ${score}\nPremi OK per ricominciare.`);
                resetGame();
            }

            gameInterval = setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        // Pulisce il canvas a ogni frame
        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Disegna il serpente
        function drawSnake() {
            snake.forEach((part, index) => {
                // La testa è di un verde più chiaro, il corpo più scuro
                ctx.fillStyle = index === 0 ? "#81c784" : "#4caf50";
                ctx.strokeStyle = "#111";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        // Muove il serpente inserendo la nuova testa e togliendo la coda
        function moveSnake() {
            // Se il gioco non è ancora iniziato (dx e dy a 0), non muoverti
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Controlla se il serpente ha mangiato il cibo
            const hasEatenFood = snake[0].x === food.x && snake[0].y === food.y;
            if (hasEatenFood) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop(); // Rimuove la coda se non ha mangiato
            }
        }

        // Genera cibo in una posizione casuale
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Impedisce al cibo di spawnare sopra il serpente
            snake.forEach(function hasSnakeEatenFood(part) {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) generateFood();
            });
        }

        // Disegna il cibo
        function drawFood() {
            ctx.fillStyle = "#ff5722"; // Rosso/Arancione
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
        }

        // Gestione dei comandi (impedisce di girarsi su se stessi)
        function changeDirection(event) {
            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === 37 && !goingRight) { // Freccia Sinistra
                dx = -1; dy = 0;
            }
            if (keyPressed === 38 && !goingDown) { // Freccia Su
                dx = 0; dy = -1;
            }
            if (keyPressed === 39 && !goingLeft) { // Freccia Destra
                dx = 1; dy = 0;
            }
            if (keyPressed === 40 && !goingUp) { // Freccia Giù
                dx = 0; dy = 1;
            }
        }

        // Controllo delle collisioni (muri o se stesso)
        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // Resetta lo stato del gioco dopo il Game Over
        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            score = 0;
            scoreElement.innerText = score;
            dx = 0;
            dy = 0;
            generateFood();
        }
    </script>
</body>
</html>
